services:
  - type: web
    name: siraguwings-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free

    envVars:
      - key: DATABASE_URL
        sync: false

      - key: FIREBASE_CREDENTIALS_PATH
        value: /etc/secrets/firebase-credentials.json

      - key: ENVIRONMENT
        value: production

      - key: ALLOWED_ORIGINS
        sync: false

    secretFiles:
      - name: firebase-credentials.json
        mountPath: /etc/secrets/firebase-credentials.json

  - type: web
    name: siraguwings-admin
    runtime: static
    rootDir: admin-web
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_BASE_URL
        sync: false

      - key: VITE_FIREBASE_API_KEY
        sync: false

      - key: VITE_FIREBASE_AUTH_DOMAIN
        value: siraguwings-8321f.firebaseapp.com

      - key: VITE_FIREBASE_PROJECT_ID
        value: siraguwings-8321f

      - key: VITE_FIREBASE_STORAGE_BUCKET
        value: siraguwings-8321f.appspot.com

      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false

      - key: VITE_FIREBASE_APP_ID
        sync: false
